<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Viewport — essencial para mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#0a0a1a" />
    <meta name="background-color" content="#0a0a1a" />
    <meta name="description" content="AstroLogs — Diário de observação astronómica. Regista observações, rastreia ISS e Tiangong, e explora o céu." />

    <!-- Apple / iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AstroLogs" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/logo512.png" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph (partilha em redes sociais) -->
    <meta property="og:title" content="AstroLogs" />
    <meta property="og:description" content="Diário de observação astronómica com rastreamento de ISS e Tiangong" />
    <meta property="og:type" content="website" />

    <!-- Manifest PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>AstroLogs</title>

    <!-- Elfsight Translate widget -->
    <script src="https://static.elfsight.com/platform/platform.js" async></script>
  </head>
  <body>
    <noscript>Precisas de JavaScript para usar o AstroLogs.</noscript>
    <div id="root"></div>
  </body>
</html>
