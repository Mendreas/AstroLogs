name: Build Electron Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Build Windows (.exe)
        run: npm run electron:build:win
        env:
          PUBLIC_URL: ./
          CI: false

      - name: Guardar instalador Windows
        uses: actions/upload-artifact@v4
        with:
          name: AstroLogs-Windows
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Build Mac (.dmg)
        run: npm run electron:build:mac
        env:
          PUBLIC_URL: ./
          CI: false
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Assinar app (ad-hoc) para evitar erro "damaged"
        run: |
          APP=$(find dist -name "*.app" -type d | head -1)
          codesign --force --deep --sign - "$APP"
          echo "App assinada: $APP"

      - name: Recriar DMG com app assinada
        run: |
          APP=$(find dist -name "*.app" -type d | head -1)
          APP_NAME=$(basename "$APP" .app)
          DMG="dist/${APP_NAME}.dmg"
          rm -f dist/*.dmg
          hdiutil create -volname "$APP_NAME" -srcfolder "$APP" -ov -format UDZO "$DMG"
          echo "DMG criado: $DMG"

      - name: Guardar instalador Mac
        uses: actions/upload-artifact@v4
        with:
          name: AstroLogs-Mac
          path: dist/*.dmg
